name: security

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project and test tools
        run: |
          python -m pip install --require-hashes -r requirements/ci.lock
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Tests
        run: python -m pytest

  audit:
    name: dependency and secret audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project and audit tools
        run: |
          python -m pip install --require-hashes -r requirements/ci.lock
          python -m pip install --no-deps --no-build-isolation -e .
          python -m pip install --require-hashes -r requirements/audit.lock
      - name: Dependency audit
        run: python -m pip_audit --skip-editable
      - name: Tracked secret scan
        run: python deploy/scan_tracked_secrets.py
      - name: Full-history Gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verified full-history TruffleHog scan
        uses: trufflesecurity/trufflehog@466da5b0bb161144f6afca9afe5d57975828c410 # v3.90.8
        with:
          extra_args: --only-verified
