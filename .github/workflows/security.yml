name: security

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project and audit tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dashboard,test]"
          python -m pip install pip-audit==2.9.0
      - name: Tests
        run: python -m pytest
      - name: Dependency audit
        run: python -m pip_audit
      - name: Tracked secret scan
        run: python deploy/scan_tracked_secrets.py
