[build-system]
requires = ["setuptools==80.9.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ladder-dragon"
dynamic = ["version"]
description = "Fail-closed Binance Spot grid trading bot"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "python-dotenv==1.1.1",
  "requests==2.32.4",
]

[project.optional-dependencies]
dashboard = [
  "fastapi==0.116.1",
  "psutil==7.0.0",
  "uvicorn==0.35.0",
]
test = [
  "httpx==0.28.1",
  "pytest==8.4.1",
]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.setuptools]
py-modules = ["ai_advisor", "ai_advisor_smoke", "ai_context", "ai_plan_runner", "ai_policy", "ai_runtime_status", "ai_statistical", "ai_supervisor", "auto_ladder_map", "autosize_universal", "backtest", "binance_testnet_smoke", "binance_transport", "db_migrate", "exchange_math", "executor_config", "executor_market", "executor_orders", "executor_planning", "executor_protection", "executor_recovery", "executor_runtime", "executor_stats", "gen_vwap_autotune", "gen_vwap_env", "ladder_pct_runner", "market_replay", "migrate_indexes", "order_identity", "order_recovery", "pnl_24h", "pnl_reporter", "product_version", "risk_ctl", "risk_manager", "risk_statistics", "run_dashboard", "simulation", "stats_view", "strategy_math", "supervisor_config", "testnet_soak_monitor", "time_safety", "tools_cancel_open", "tools_market", "tools_stats", "trade_accounting", "update_vwap_env", "venue_config"]

[tool.setuptools.dynamic]
version = {attr = "product_version.__version__"}
