server {
    listen 80;
    listen [::]:80;
    server_name __BOT_HOSTNAME__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __BOT_HOSTNAME__;

    ssl_certificate     /etc/nginx/certs/__BOT_HOSTNAME__.pem;
    ssl_certificate_key /etc/nginx/certs/__BOT_HOSTNAME__-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    auth_basic "Ladder Dragon";
    auth_basic_user_file /etc/nginx/.htpasswd-ladder-dragon;

    root /var/www/bot;
    index index.html;

    location /api/ {
        include /etc/nginx/snippets/pi_api.conf;
        proxy_pass http://127.0.0.1:8081;
    }

    # Конфигурационные и secret-backup никогда не публикуются через HTTP.
    location ^~ /backups/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
