server {
    listen 80;
    listen [::]:80;
    server_name __BOT_HOSTNAME__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __BOT_HOSTNAME__;

    ssl_certificate     /etc/nginx/certs/__BOT_HOSTNAME__.pem;
    ssl_certificate_key /etc/nginx/certs/__BOT_HOSTNAME__-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-XUhSFob0GcaTn0kJX+n2S4b6zogiwF5/mrCfeN1ckgs='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header X-Frame-Options "DENY" always;

    auth_basic "Ladder Dragon";
    auth_basic_user_file /etc/nginx/.htpasswd-ladder-dragon;

    root /var/www/bot;
    index index.html;

    location /api/ {
        include /etc/nginx/snippets/pi_api.conf;
        include /etc/nginx/snippets/ladder_dragon_proxy_secret.conf;
        proxy_pass http://127.0.0.1:8081;
    }

    # Только очищенная статическая копия journal. Server-level Basic Auth
    # обязателен и для каталога, и для прямой ссылки current.log.
    location /logs/ {
    alias /var/lib/ladder-dragon/logs/;
    autoindex on;
    autoindex_localtime on;
    autoindex_exact_size off;
    default_type text/plain;
    charset utf-8;
    add_header Cache-Control "no-store";
    }

    # В HTTP-каталог попадают только копии age-зашифрованных архивов,
    # checksum и inventory без секретов. Server-level Basic Auth обязателен.
    location ^~ /backups/ {
        alias /var/lib/ladder-dragon/backups-public/;
        autoindex on;
        autoindex_localtime on;
        autoindex_exact_size off;
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "no-store";
    }

    # CHANGELOG читается в браузере, а не скачивается как неизвестный .md-файл.
    location = /CHANGELOG.md {
        default_type text/plain;
        charset utf-8;
        add_header Content-Disposition "inline" always;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
