[Service]
# Дополнительные пути для heartbeat и AI usage log. Drop-in не меняет ExecStart,
# поэтому текущий Testnet/Mainnet и набор CLI-флагов остаются без изменений.
RuntimeDirectory=mybot
RuntimeDirectoryMode=0700
ReadWritePaths=/home/bot/apps/binance_bot/db /home/bot/apps/binance_bot/logs /run/mybot
